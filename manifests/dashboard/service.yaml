apiVersion: v1 
kind: Service 
metadata:
  name: dashboard-service
  namespace: ticketops
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app: dashboard
spec:
  selector:
    app: dashboard
  type: ClusterIP
  ports:
    - name: http
      targetPort: 8080
      port: 80
      protocol: TCP