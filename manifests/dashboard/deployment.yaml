apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: ticketops
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app: dashboard
    version: v1.6.1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
        version: v1.6.1
    spec:
      serviceAccountName: dashboard-sa
      containers:
        - name: dashboard
          image: 599476212737.dkr.ecr.ap-south-1.amazonaws.com/ticketops-dev-dashboard:v1.6.1
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 80 
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m" 
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
