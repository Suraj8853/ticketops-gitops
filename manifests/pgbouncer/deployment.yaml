apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: ticketops
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app: pgbouncer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
        version: v1.0.0
    spec:
      containers:
        - name: pgbouncer
          image: docker.io/bitnami/pgbouncer:1.21.0
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: host
            - name: POSTGRESQL_PORT
              value: "5432"
            - name: POSTGRESQL_DATABASE
              value: "ticketops"
            - name: POSTGRESQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: PGBOUNCER_PORT
              value: "5432"
            - name: PGBOUNCER_POOL_MODE
              value: "transaction"
            - name: PGBOUNCER_MAX_CLIENT_CONN
              value: "1000"
            - name: PGBOUNCER_DEFAULT_POOL_SIZE
              value: "20"
            - name: PGBOUNCER_SERVER_TLS_SSLMODE
              value: "prefer"
            - name: PGBOUNCER_CLIENT_TLS_SSLMODE
              value: "disable"
            - name: PGBOUNCER_DATABASE
              value: "ticketops"
            - name: PGBOUNCER_AUTH_TYPE
              value: "md5"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 30
            periodSeconds: 10
