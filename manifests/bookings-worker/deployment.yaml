apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookings-worker
  namespace: ticketops
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app: bookings-worker
    version: v1.6.1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bookings-worker
  template:
    metadata:
      labels:
        app: bookings-worker
        version: v1.6.1
    spec:
      serviceAccountName: bookings-worker-sa
      containers:
        - name: bookings-worker
          image: 599476212737.dkr.ecr.ap-south-1.amazonaws.com/ticketops-dev-bookings-worker:v1.17.0
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: bookings-worker-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: host
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
