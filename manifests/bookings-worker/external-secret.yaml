apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bookings-worker-redis-secrets
  namespace: ticketops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: redis-credentials
    creationPolicy: Owner
  data:
    - secretKey: host
      remoteRef:
        key: ticketops-dev-redis-host
