apiVersion: batch/v1
kind: CronJob
metadata:
  name: seat-lock-expiry
  namespace: ticketops
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: seat-lock-expiry
        spec:
          restartPolicy: OnFailure
          containers:
            - name: seat-lock-expiry
              image: 599476212737.dkr.ecr.ap-south-1.amazonaws.com/ticketops-dev-events-api:v1.5.5
              command:
                - node
                - -e
                - |
                  const { Pool } = require('pg');
                  const pool = new Pool({
                    host: process.env.DB_HOST,
                    port: parseInt(process.env.DB_PORT) || 5432,
                    database: process.env.DB_NAME,
                    user: process.env.DB_USER,
                    password: process.env.DB_PASSWORD,
                    ssl: { rejectUnauthorized: false }
                  });
                  pool.query(
                    "UPDATE seats SET status = 'available', locked_until = NULL WHERE status = 'locked' AND locked_until < NOW()"
                  ).then(result => {
                    console.log('Released', result.rowCount, 'expired seat locks');
                    process.exit(0);
                  }).catch(err => {
                    console.error('Error:', err.message);
                    process.exit(1);
                  });
              env:
                - name: DB_HOST
                  valueFrom:
                    secretKeyRef:
                      name: db-credentials
                      key: host
                - name: DB_PORT
                  value: "5432"
                - name: DB_NAME
                  value: "ticketops"
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: db-credentials
                      key: username
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: db-credentials
                      key: password
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "100m"
                  memory: "128Mi"
