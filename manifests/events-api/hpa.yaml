apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: events-api-hpa
  namespace: ticketops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: events-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource: 
        name: memory
        target:
          type: Utilization
          averageUtilization: 80