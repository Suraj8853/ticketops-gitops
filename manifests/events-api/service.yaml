apiVersion: v1
kind: Service 
metadata:
  name: events-api-service
  namespace: ticketops
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app: event-api
spec:
  type: ClusterIP
  selector:
    app: events-api
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
    
