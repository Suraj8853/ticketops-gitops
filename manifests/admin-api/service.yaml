apiVersion: v1
kind: Service
metadata:
  name: admin-api-service
  namespace: ticketops
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels: 
    app: admin-api
spec:
  selector:
    app: admin-api
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 4000
      protocol: TCP