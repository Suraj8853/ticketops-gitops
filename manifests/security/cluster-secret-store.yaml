apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa 
  namespace: external-secrets
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::599476212737:role/ticketops-dev-external-secret
  labels:
    app: external-secret

--- 

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
  