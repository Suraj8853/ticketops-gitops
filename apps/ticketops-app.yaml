apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ticketops
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/Suraj8853/ticketops-gitops
    targetRevision: HEAD
    path: manifests
    directory:
      recurse:  true
  destination:
    server: https://kubernetes.default.svc
    namespace: ticketops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true 